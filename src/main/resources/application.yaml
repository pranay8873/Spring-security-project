spring:
  application:
    name: security

  datasource:
    url: jdbc:mysql://localhost:3306/spring-security?createDatabaseIfNotExist=true
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect
jwt:
  validity:
    accessToken: 86400000
    refreshToken: 2592000000
  secret: jwt-secret-code

server:
  port: 8080